<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Стоп-лист организаций</title>
<style>
  body { font-family: Arial, sans-serif; padding: 20px; background: #f5f5f5; }
  table { border-collapse: collapse; width: 100%; margin-top: 20px; }
  th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
  th { background-color: #4CAF50; color: white; }
  img { width: 80px; height: auto; }
  button { padding: 10px 20px; background: #2196F3; color: white; border: none; cursor: pointer; }
  button:hover { background: #0b7dda; }
</style>
</head>
<body>

<h1>Стоп-лист организаций</h1>
<button id="refreshBtn">Обновить</button>
<table id="stopTable">
  <thead>
    <tr>
      <th>Фото</th>
      <th>Организация</th>
      <th>TerminalGroupId</th>
      <th>ProductId</th>
      <th>Название продукта</th>
      <th>Баланс</th>
      <th>Обновлено</th>
    </tr>
  </thead>
  <tbody></tbody>
</table>

<script>
const STOPLIST_URL = "https://script.google.com/macros/s/AKfycby-OU2w7NJXs_YCP5-9PW9Fuk5Xv6Xrd7Xk_pPYkbw-_zOp3seEAyd9iXF9zvBb4Ed1/exec";

// Словарь организации → фото
const ORG_PHOTOS = {
  "T-086 КЗ": "https://example.com/photo1.png",
  "T-103 КЗ": "https://example.com/photo2.png",
  "T-104 КЗ": "https://example.com/photo3.png",
  "T-110 КЗ": "https://example.com/photo4.png",
  "T-117 КЗ": "https://example.com/photo5.png",
  "T-118 КЗ": "https://example.com/photo6.png",
  "T-119 КЗ": "https://example.com/photo7.png"
};

function fetchStopList() {
  fetch(STOPLIST_URL)
    .then(response => response.json())
    .then(data => {
      const tbody = document.querySelector("#stopTable tbody");
      tbody.innerHTML = "";

      data.forEach(row => {
        const tr = document.createElement("tr");

        // Фото
        const imgTd = document.createElement("td");
        const img = document.createElement("img");
        img.src = ORG_PHOTOS[row.OrganizationName] || "";
        imgTd.appendChild(img);
        tr.appendChild(imgTd);

        // Название организации
        const orgTd = document.createElement("td");
        orgTd.textContent = row.OrganizationName;
        tr.appendChild(orgTd);

        // TerminalGroupId
        const termTd = document.createElement("td");
        termTd.textContent = row.TerminalGroupId;
        tr.appendChild(termTd);

        // ProductId
        const prodTd = document.createElement("td");
        prodTd.textContent = row.ProductId;
        tr.appendChild(prodTd);

        // Название продукта
        const nameTd = document.createElement("td");
        nameTd.textContent = row.ProductName || "";
        tr.appendChild(nameTd);

        // Баланс
        const balTd = document.createElement("td");
        balTd.textContent = row.Balance;
        tr.appendChild(balTd);

        // Дата обновления
        const dateTd = document.createElement("td");
        dateTd.textContent = row.UpdatedAt;
        tr.appendChild(dateTd);

        tbody.appendChild(tr);
      });
    })
    .catch(err => console.error("Ошибка загрузки стоп-листа:", err));
}

// Кнопка обновления
document.getElementById("refreshBtn").addEventListener("click", () => {
  // Запускаем скрипт и обновляем таблицу
  fetch(STOPLIST_URL)
    .then(() => {
      setTimeout(fetchStopList, 2000); // даём скрипту 2 сек на обновление
    });
});

// Загрузка при старте
fetchStopList();
</script>

</body>
</html>
