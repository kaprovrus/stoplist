<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Стоп-лист организаций</title>
<style>
  body { font-family: Arial, sans-serif; padding: 20px; background: #f5f5f5; }
  table { border-collapse: collapse; width: 100%; margin-top: 20px; }
  th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
  th { background-color: #4CAF50; color: white; }
  button { padding: 10px 20px; background: #2196F3; color: white; border: none; cursor: pointer; }
  button:hover { background: #0b7dda; }
  .no-photo { color: #999; font-style: italic; }
</style>
</head>
<body>

<h1>Стоп-лист организаций</h1>
<button id="refreshBtn">Обновить</button>
<table id="stopTable">
  <thead>
    <tr>
      <th>Организация</th>
      <th>TerminalGroupId</th>
      <th>ProductId</th>
      <th>Название продукта</th>
      <th>Баланс</th>
      <th>Обновлено</th>
    </tr>
  </thead>
  <tbody></tbody>
</table>

<script>
const STOPLIST_URL = "https://script.google.com/macros/s/AKfycby-OU2w7NJXs_YCP5-9PW9Fuk5Xv6Xrd7Xk_pPYkbw-_zOp3seEAyd9iXF9zvBb4Ed1/exec";

// Словарь ID → название организации
const ORG_NAMES = {
  "25dce975-4631-4f2f-b191-0d44195ad5ed": "T-086 КЗ",
  "8c4e2b8e-6b4a-40f4-9c7f-68a2f5d62445": "T-103 КЗ",
  "27a6f2df-366d-426d-a015-7579b856fa64": "T-104 КЗ",
  "2d4cc037-1414-458f-a084-7a76f2b75062": "T-110 КЗ",
  "86871894-0d80-4148-8992-c0c5811ad5cf": "T-117 КЗ",
  "74127077-f35e-410b-ad97-cb013398266d": "T-118 КЗ",
  "6875a62f-f49b-49e4-a2b9-4edc4797d06e": "T-119 КЗ"
};

function fetchStopList() {
  fetch(STOPLIST_URL)
    .then(response => {
      if (!response.ok) {
        throw new Error('Ошибка сети: ' + response.status);
      }
      return response.json();
    })
    .then(data => {
      console.log("Получены данные:", data); // Для отладки
      const tbody = document.querySelector("#stopTable tbody");
      tbody.innerHTML = "";

      // Проверяем, что data - это массив
      if (!Array.isArray(data)) {
        console.error("Данные не являются массивом:", data);
        tbody.innerHTML = `<tr><td colspan="6" style="text-align: center; color: red;">Ошибка: полученные данные не являются массивом</td></tr>`;
        return;
      }

      if (data.length === 0) {
        tbody.innerHTML = `<tr><td colspan="6" style="text-align: center;">Нет данных для отображения</td></tr>`;
        return;
      }

      data.forEach(row => {
        const tr = document.createElement("tr");

        // Получаем название организации по ID
        const orgId = row.OrganizationName || row.organizationId || row.orgId || "";
        const orgDisplayName = ORG_NAMES[orgId] || orgId || "Неизвестно";

        // Название организации (теперь первая колонка)
        const orgTd = document.createElement("td");
        orgTd.textContent = orgDisplayName;
        tr.appendChild(orgTd);

        // TerminalGroupId
        const termTd = document.createElement("td");
        termTd.textContent = row.TerminalGroupId || row.terminalGroupId || "";
        tr.appendChild(termTd);

        // ProductId
        const prodTd = document.createElement("td");
        prodTd.textContent = row.ProductId || row.productId || "";
        tr.appendChild(prodTd);

        // Название продукта
        const nameTd = document.createElement("td");
        nameTd.textContent = row.ProductName || row.productName || "";
        tr.appendChild(nameTd);

        // Баланс
        const balTd = document.createElement("td");
        balTd.textContent = row.Balance !== undefined ? row.Balance : (row.balance !== undefined ? row.balance : "");
        tr.appendChild(balTd);

        // Дата обновления
        const dateTd = document.createElement("td");
        dateTd.textContent = row.UpdatedAt || row.updatedAt || row.updateTime || "";
        tr.appendChild(dateTd);

        tbody.appendChild(tr);
      });
    })
    .catch(err => {
      console.error("Ошибка загрузки стоп-листа:", err);
      // Показываем сообщение об ошибке в таблице
      const tbody = document.querySelector("#stopTable tbody");
      tbody.innerHTML = `<tr><td colspan="6" style="text-align: center; color: red;">Ошибка загрузки данных: ${err.message}</td></tr>`;
    });
}

// Кнопка обновления
document.getElementById("refreshBtn").addEventListener("click", () => {
  fetchStopList();
});

// Загрузка при старте
document.addEventListener('DOMContentLoaded', fetchStopList);
</script>

</body>
</html>
